<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wlcm admin</title>
    <link rel="stylesheet" href="two.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
    <h1>Manage Books, Users, and Borrow Records From One Place</h1>
   

    <div class="sidebar">

    <h2>Admin</h2>

    <button class="sidebtn" id="add">
        <i class="fa-solid fa-book"></i>
        <span>Add Book</span>
    </button>

    <button class="sidebtn" id="users">
        <i class="fa-solid fa-user-check"></i>
        <span>User Who Borrowed</span>
    </button>

    <button class="sidebtn" id="use">
        <i class="fa-solid fa-users"></i>
        <span>All Onboarded Users</span>
    </button>

</div>
    <img id="truu" src="truu.jpg" alt="">
    <script src="two.js"></script>
</body>
</html>
